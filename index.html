<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:transparent;
padding:15px;

font-family:'DotGothic16',sans-serif;

}

/* Win98 視窗 */

.window{

width:100%;
max-width:430px;

background:#FFFCFE;

border:2px solid #E7DCEB;

border-radius:10px;

overflow:hidden;

}

/* 標題列 */

.titlebar{

height:34px;

background:#F7F1F9;

border-bottom:1px solid #E7DCEB;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 10px;

}

/* 標題 */

.title{

font-size:12px;

color:#8D7A9E;

letter-spacing:1px;

}

/* Win98按鈕 */

.buttons{

display:flex;

gap:5px;

}

.btn{

width:14px;
height:14px;

border:1px solid #D8C8E0;

background:#FFFFFF;

display:flex;

align-items:center;
justify-content:center;

font-size:8px;

color:#9C8BB1;

}

/* 內容 */

.content{

padding:20px;

font-size:13px;

color:#6B6178;

}

/* 區塊 */

.item{

margin-bottom:18px;

}

/* 小標籤 */

.label{

display:inline-block;

padding:3px 8px;

font-size:10px;

background:#F8F3FA;

border:1px solid #ECE2F1;

border-radius:999px;

color:#9A88AF;

margin-bottom:8px;

}

/* 分隔線 */

.divider{

border-top:1px dashed #E8DDED;

margin:14px 0;

}

/* 內容字 */

.value{

padding-left:2px;

}

</style>

</head>

<body>

<div class="window">

<div class="titlebar">

<div class="title">
♡ CURRENTLY ♡
</div>

<div class="buttons">

<div class="btn">─</div>

<div class="btn">□</div>

<div class="btn">✕</div>

</div>

</div>

<div id="currently" class="content">

Loading...

</div>

</div>

<script>

fetch('./currently.json')
.then(response => response.json())
.then(data => {

document.getElementById('currently').innerHTML = `

<div class="item">

<div class="label">
最近聆聽
</div>

<div class="value">
${data.listening}
</div>

</div>

<div class="divider"></div>

<div class="item">

<div class="label">
正在沉迷
</div>

<div class="value">
${data.obsession}
</div>

</div>

<div class="divider"></div>

<div class="item">

<div class="label">
在玩什麼
</div>

<div class="value">
${data.playing}
</div>

</div>

<div class="divider"></div>

<div class="item">

<div class="label">
心情
</div>

<div class="value">
${data.mood}
</div>

</div>

`;

});

</script>

</body>
</html>
